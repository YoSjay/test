<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vouch Tracker | SJTweaks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface-2: #1f1f1f;
            --border: #2a2a2a;
            --text: #fafafa;
            --text-2: #a0a0a0;
            --accent: #10b981;
            --accent-2: #059669;
            --red: #f43f5e;
            --orange: #f97316;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            width: 44px;
            height: 44px;
            filter: brightness(1.2);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--text-2);
            font-weight: 400;
        }

        /* Upload section */
        .upload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .upload-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-zone:hover, .upload-zone.drag {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .upload-zone input { display: none; }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .upload-zone h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .upload-zone p {
            color: var(--text-2);
            font-size: 0.9rem;
        }

        .preview {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .preview.show { display: flex; }

        .preview img {
            max-width: 350px;
            max-height: 220px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 14px 40px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--accent-2); transform: scale(1.02); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn.analyzing {
            background: var(--surface-2);
            color: var(--text-2);
        }

        /* Result card */
        .result {
            display: none;
            background: var(--surface);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 32px;
            animation: pop 0.4s ease;
        }

        .result.show { display: block; }

        @keyframes pop {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result.success { border: 2px solid var(--accent); }
        .result.error { border: 2px solid var(--red); }

        .result-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .result h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result .amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0;
        }

        .result .staff-credited {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .result .product-tag {
            display: inline-block;
            padding: 6px 14px;
            background: var(--surface-2);
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-2);
            margin-top: 12px;
        }

        .result .error-msg {
            color: var(--red);
            font-size: 1rem;
        }

        .result .btn {
            margin-top: 24px;
            background: var(--surface-2);
            color: var(--text);
        }

        .result .btn:hover { background: var(--border); }

        /* Stats grid */
        .stats-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-2);
        }

        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .staff-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .staff-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--staff-color);
        }

        .staff-stat .name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--staff-color);
        }

        .staff-stat .earnings {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--accent);
        }

        .staff-stat .count {
            font-size: 0.8rem;
            color: var(--text-2);
            margin-top: 4px;
        }

        /* Chart */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        .chart-wrap {
            display: flex;
            justify-content: center;
        }

        .chart-wrap canvas {
            max-width: 280px !important;
            max-height: 280px !important;
        }

        .hint {
            text-align: center;
            padding: 40px;
            color: var(--text-2);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks" class="logo">
            <h1>Vouch Tracker <span>/ staff earnings</span></h1>
        </header>

        <div class="upload-card">
            <h2>Submit a Vouch</h2>
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/*">
                <div class="upload-icon">📸</div>
                <h3>Drop vouch screenshot here</h3>
                <p>AI will detect the staff member and product automatically</p>
            </div>
            <div class="preview" id="preview">
                <img id="previewImg" src="" alt="">
                <button class="btn" id="submitBtn">Analyze & Submit</button>
            </div>
        </div>

        <div class="result" id="result">
            <div class="result-icon" id="resultIcon">✅</div>
            <h3 id="resultTitle">Vouch Approved!</h3>
            <div class="amount" id="resultAmount">+$0.00</div>
            <div class="staff-credited" id="resultStaff">Added to SJay's earnings</div>
            <div class="product-tag" id="resultProduct">Zero Delay</div>
            <button class="btn" onclick="resetForm()">Submit Another</button>
        </div>

        <section class="stats-section">
            <h2>Staff Earnings</h2>
            <div class="staff-grid" id="staffGrid">
                <div class="hint">Loading stats...</div>
            </div>
            
            <div class="chart-card" id="chartCard" style="display: none;">
                <h3>Products Breakdown</h3>
                <div class="chart-wrap">
                    <canvas id="productsChart"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API = '';
        let file = null;
        let chart = null;

        const STAFF_COLORS = {
            sjay: '#06b6d4',
            nouzen: '#f43f5e',
            daedae: '#10b981',
            kyzo: '#8b5cf6'
        };

        // Load all staff stats
        async function loadStats() {
            try {
                const res = await fetch(`${API}/api/vouches/admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: 'sofmun-Gitpox-syzto1' })
                });
                const data = await res.json();
                
                if (data.success) {
                    renderStats(data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderStats(data) {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = data.staff.map(s => `
                <div class="staff-stat" style="--staff-color: ${STAFF_COLORS[s.id]}">
                    <div class="name">${s.name}</div>
                    <div class="earnings">$${s.totalEarnings.toFixed(2)}</div>
                    <div class="count">${s.vouchCount} vouches</div>
                </div>
            `).join('');

            // Chart
            if (data.recentVouches.length > 0) {
                document.getElementById('chartCard').style.display = 'block';
                
                const productCounts = {};
                data.recentVouches.forEach(v => {
                    const p = v.product || 'Unknown';
                    productCounts[p] = (productCounts[p] || 0) + 1;
                });

                const productColors = {
                    'Controller Macro': '#8b5cf6',
                    'Zero Delay': '#3b82f6',
                    'Zero Delay Plus': '#06b6d4',
                    'FPS Boost': '#10b981',
                    'Ping Optimizer': '#f97316',
                    'Premium Utility': '#eab308',
                    'Aim Bundle': '#ec4899',
                    'Shotgun Pack': '#f43f5e',
                    'Keyboard Macro': '#6366f1',
                    'Unknown': '#6b7280'
                };

                if (chart) chart.destroy();
                chart = new Chart(document.getElementById('productsChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(productCounts),
                        datasets: [{
                            data: Object.values(productCounts),
                            backgroundColor: Object.keys(productCounts).map(p => productColors[p] || '#6b7280'),
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '55%',
                        plugins: {
                            legend: { 
                                position: 'bottom',
                                labels: { color: '#a0a0a0', font: { family: 'Outfit', size: 11 }, padding: 10 }
                            }
                        }
                    }
                });
            }
        }

        loadStats();

        // Upload handling
        const zone = document.getElementById('uploadZone');
        const input = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');

        zone.onclick = () => input.click();
        zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag'); };
        zone.ondragleave = () => zone.classList.remove('drag');
        zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); };
        input.onchange = e => handleFile(e.target.files[0]);

        function handleFile(f) {
            if (!f?.type.startsWith('image/')) return;
            file = f;
            const r = new FileReader();
            r.onload = e => {
                previewImg.src = e.target.result;
                zone.style.display = 'none';
                preview.classList.add('show');
            };
            r.readAsDataURL(f);
        }

        submitBtn.onclick = async () => {
            if (!file) return;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Analyzing with AI...';
            submitBtn.classList.add('analyzing');

            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            try {
                const res = await fetch(`${API}/api/vouches/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: base64 })
                });
                const data = await res.json();

                preview.classList.remove('show');
                result.classList.add('show');

                if (data.success) {
                    result.className = 'result show success';
                    document.getElementById('resultIcon').textContent = '✅';
                    document.getElementById('resultTitle').textContent = 'Vouch Approved!';
                    document.getElementById('resultAmount').textContent = `+$${data.amountPerPerson.toFixed(2)}`;
                    document.getElementById('resultStaff').textContent = `Added to ${data.staffCredited.join(' & ')}'s earnings`;
                    document.getElementById('resultProduct').textContent = data.product || 'Unknown Product';
                    document.getElementById('resultProduct').style.display = 'inline-block';
                    loadStats();
                } else {
                    result.className = 'result show error';
                    document.getElementById('resultIcon').textContent = '❌';
                    document.getElementById('resultTitle').textContent = 'Vouch Rejected';
                    document.getElementById('resultAmount').textContent = '';
                    document.getElementById('resultStaff').innerHTML = `<span class="error-msg">${data.error}</span>`;
                    document.getElementById('resultProduct').style.display = 'none';
                }
            } catch (e) {
                result.className = 'result show error';
                document.getElementById('resultIcon').textContent = '❌';
                document.getElementById('resultTitle').textContent = 'Error';
                document.getElementById('resultAmount').textContent = '';
                document.getElementById('resultStaff').innerHTML = `<span class="error-msg">${e.message}</span>`;
                document.getElementById('resultProduct').style.display = 'none';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Analyze & Submit';
            submitBtn.classList.remove('analyzing');
        };

        function resetForm() {
            result.classList.remove('show');
            zone.style.display = '';
            file = null;
            input.value = '';
        }
    </script>
</body>
</html>
