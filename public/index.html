<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJTweaks Staff Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --cyan: #00d9ff;
            --cyan-dim: #00d9ff40;
            --text: #e8e8e8;
            --text-dim: #888;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--cyan-dim) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .bg-glow:nth-child(1) { top: -200px; left: -200px; }
        .bg-glow:nth-child(2) { bottom: -200px; right: -200px; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 20px var(--cyan));
        }

        .logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 30px var(--cyan);
        }

        .logo span {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Staff selector */
        .staff-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .staff-btn {
            padding: 15px 30px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .staff-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .staff-btn:hover::before {
            transform: translateX(100%);
        }

        .staff-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .staff-btn.active {
            border-color: var(--staff-color, var(--cyan));
            box-shadow: 0 0 30px var(--staff-color, var(--cyan-dim));
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--staff-color, var(--cyan));
        }

        .stat-card h3 {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-card .value.money {
            color: var(--success);
        }

        /* Upload section */
        .upload-section {
            background: var(--bg-card);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 50px;
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-section:hover, .upload-section.dragover {
            border-color: var(--cyan);
            background: rgba(0, 217, 255, 0.05);
        }

        .upload-section input {
            display: none;
        }

        .upload-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--cyan) 0%, #0099cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .upload-section h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .upload-section p {
            color: var(--text-dim);
        }

        /* Preview */
        .preview {
            display: none;
            margin-top: 20px;
        }

        .preview.show {
            display: block;
        }

        .preview img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 12px;
            border: 2px solid var(--cyan);
        }

        .submit-btn {
            margin-top: 20px;
            padding: 15px 50px;
            background: linear-gradient(135deg, var(--cyan) 0%, #0099cc 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Status message */
        .status {
            margin-top: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
        }

        .status.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Vouch history */
        .vouches-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vouches-section h2::before {
            content: '';
            width: 4px;
            height: 25px;
            background: var(--staff-color, var(--cyan));
            border-radius: 2px;
        }

        .vouches-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .vouch-item {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .vouch-item:hover {
            background: var(--bg-card-hover);
            transform: translateX(5px);
        }

        .vouch-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .vouch-product {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vouch-product .tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            background: var(--cyan-dim);
            color: var(--cyan);
            border-radius: 4px;
            font-weight: 700;
        }

        .vouch-product .tag.controller {
            background: rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }

        .vouch-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .vouch-amount {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--success);
        }

        .vouch-split {
            font-size: 0.8rem;
            color: var(--warning);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--bg-card);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .stat-card .value {
                font-size: 2rem;
            }

            .vouch-item {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks">
                <div>
                    <h1>STAFF PORTAL</h1>
                    <span>Track your vouches & earnings</span>
                </div>
            </div>
        </header>

        <div class="staff-selector">
            <button class="staff-btn" data-staff="sjay" style="--staff-color: #00d9ff">SJay</button>
            <button class="staff-btn" data-staff="nouzen" style="--staff-color: #ff6b6b">Nouzen</button>
            <button class="staff-btn" data-staff="daedae" style="--staff-color: #4ecdc4">DaeDae</button>
            <button class="staff-btn" data-staff="kyzo" style="--staff-color: #a855f7">Kyzo</button>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Earnings</h3>
                    <div class="value money" id="totalEarnings">$0.00</div>
                </div>
                <div class="stat-card">
                    <h3>Total Vouches</h3>
                    <div class="value" id="totalVouches">0</div>
                </div>
                <div class="stat-card">
                    <h3>Controller Sales</h3>
                    <div class="value" id="controllerSales">0</div>
                </div>
            </div>

            <div class="upload-section" id="uploadZone">
                <input type="file" id="fileInput" accept="image/*">
                <div class="upload-icon">📸</div>
                <h3>Submit a Vouch</h3>
                <p>Drag & drop a screenshot or click to upload</p>
                <div class="preview" id="preview">
                    <img id="previewImg" src="" alt="Preview">
                    <br>
                    <button class="submit-btn" id="submitBtn" disabled>Analyze & Submit</button>
                </div>
                <div class="status" id="status"></div>
            </div>

            <section class="vouches-section">
                <h2>Your Vouches</h2>
                <div class="vouches-list" id="vouchesList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>
        </div>

        <div id="selectPrompt" style="text-align: center; padding: 100px 20px; color: var(--text-dim);">
            <h2 style="margin-bottom: 10px;">👆 Select your name above</h2>
            <p>to view your dashboard and submit vouches</p>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentStaff = null;
        let selectedFile = null;

        // Staff buttons
        document.querySelectorAll('.staff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStaff = btn.dataset.staff;
                
                document.documentElement.style.setProperty('--staff-color', getComputedStyle(btn).getPropertyValue('--staff-color'));
                
                document.getElementById('selectPrompt').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                
                loadStaffData();
            });
        });

        // Load staff data
        async function loadStaffData() {
            try {
                const res = await fetch(`${API_BASE}/api/vouches/staff/${currentStaff}`);
                const data = await res.json();

                if (data.success) {
                    document.getElementById('totalEarnings').textContent = `$${data.staff.totalEarnings.toFixed(2)}`;
                    document.getElementById('totalVouches').textContent = data.staff.vouchCount;
                    
                    const controllerCount = data.staff.vouchDetails.filter(v => v.isController).length;
                    document.getElementById('controllerSales').textContent = controllerCount;

                    renderVouches(data.staff.vouchDetails);
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderVouches(vouches) {
            const list = document.getElementById('vouchesList');
            
            if (!vouches || vouches.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <h3>No vouches yet</h3>
                        <p>Submit your first vouch screenshot above!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = vouches.map(v => `
                <div class="vouch-item">
                    <div class="vouch-info">
                        <div class="vouch-product">
                            ${v.product}
                            <span class="tag ${v.isController ? 'controller' : ''}">${v.isController ? '$3' : '$1'}</span>
                        </div>
                        <div class="vouch-meta">
                            ${new Date(v.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                            ${v.staffInvolved.length > 1 ? ` • Split with ${v.staffInvolved.filter(s => s !== currentStaff).join(', ')}` : ''}
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="vouch-amount">+$${v.earningsPerPerson.toFixed(2)}</div>
                        ${v.staffInvolved.length > 1 ? `<div class="vouch-split">Split ${v.staffInvolved.length} ways</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // File upload
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('Please upload an image file', 'error');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.classList.add('show');
                submitBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        submitBtn.addEventListener('click', async () => {
            if (!selectedFile || !currentStaff) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Analyzing...';
            status.className = 'status';
            status.style.display = 'none';

            try {
                const base64 = await fileToBase64(selectedFile);
                
                const res = await fetch(`${API_BASE}/api/vouches/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        staffId: currentStaff,
                        imageBase64: base64
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showStatus(`✅ ${data.message}`, 'success');
                    preview.classList.remove('show');
                    selectedFile = null;
                    fileInput.value = '';
                    loadStaffData();
                } else {
                    showStatus(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }

            submitBtn.textContent = 'Analyze & Submit';
            submitBtn.disabled = true;
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }
    </script>
</body>
</html>
