<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | SJTweaks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface-2: #1f1f1f;
            --border: #2a2a2a;
            --text: #fafafa;
            --text-2: #a0a0a0;
            --accent: #10b981;
            --accent-2: #059669;
            --red: #f43f5e;
            --orange: #f97316;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Subtle noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            width: 44px;
            height: 44px;
            filter: brightness(1.2);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--text-2);
            font-weight: 400;
        }

        /* Staff tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        .tab.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* Dashboard layout */
        .dashboard {
            display: none;
            gap: 24px;
        }

        .dashboard.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        /* Stats row */
        .stats-row {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-2);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
        }

        .stat-value.green { color: var(--accent); }
        .stat-value.purple { color: var(--purple); }

        /* Chart card */
        .chart-card {
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .chart-container canvas {
            max-width: 180px !important;
            max-height: 180px !important;
        }

        /* Upload card */
        .upload-card {
            grid-column: 1 / -1;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-zone:hover, .upload-zone.drag {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .upload-zone input { display: none; }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .upload-zone h3 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .upload-zone p {
            color: var(--text-2);
            font-size: 0.9rem;
        }

        .preview {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .preview.show { display: flex; }

        .preview img {
            max-width: 280px;
            max-height: 180px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 12px 32px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--accent-2); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .status.show { display: block; }
        .status.ok { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .status.err { background: rgba(244, 63, 94, 0.15); color: var(--red); }

        /* Vouches list */
        .vouches-card {
            grid-column: 1 / -1;
        }

        .vouch-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .vouch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--surface-2);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .vouch-item:hover { background: #252525; }

        .vouch-info h4 {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .vouch-info p {
            font-size: 0.8rem;
            color: var(--text-2);
        }

        .vouch-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 4px;
            margin-left: 8px;
        }

        .tag.controller { background: var(--purple); color: #fff; }
        .tag.regular { background: var(--border); color: var(--text-2); }

        .empty {
            text-align: center;
            padding: 48px;
            color: var(--text-2);
        }

        .empty span { font-size: 2rem; display: block; margin-bottom: 12px; }

        /* Prompt */
        #prompt {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-2);
        }

        #prompt h2 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        @media (max-width: 700px) {
            .dashboard.active { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr; }
            .stat-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks" class="logo">
            <h1>Staff Portal <span>/ vouches</span></h1>
        </header>

        <div class="tabs">
            <button class="tab" data-staff="sjay">SJay</button>
            <button class="tab" data-staff="nouzen">Nouzen</button>
            <button class="tab" data-staff="daedae">DaeDae</button>
            <button class="tab" data-staff="kyzo">Kyzo</button>
        </div>

        <div id="prompt">
            <h2>Select your name above</h2>
            <p>to view your dashboard and submit vouches</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-label">Total Earned</div>
                    <div class="stat-value green" id="totalEarned">$0.00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total Vouches</div>
                    <div class="stat-value" id="totalVouches">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Controller Sales</div>
                    <div class="stat-value purple" id="controllerCount">0</div>
                </div>
            </div>

            <div class="card chart-card">
                <div class="card-title">Earnings Breakdown</div>
                <div class="chart-container">
                    <canvas id="earningsChart"></canvas>
                </div>
            </div>

            <div class="card chart-card">
                <div class="card-title">Vouch Types</div>
                <div class="chart-container">
                    <canvas id="typesChart"></canvas>
                </div>
            </div>

            <div class="card upload-card">
                <div class="card-title">Submit Vouch</div>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" accept="image/*">
                    <div class="upload-icon">📸</div>
                    <h3>Drop screenshot here</h3>
                    <p>or click to browse</p>
                </div>
                <div class="preview" id="preview">
                    <img id="previewImg" src="" alt="">
                    <button class="btn" id="submitBtn" disabled>Analyze & Submit</button>
                </div>
                <div class="status" id="status"></div>
            </div>

            <div class="card vouches-card">
                <div class="card-title">Your Vouches</div>
                <div class="vouch-list" id="vouchList"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let staff = null;
        let file = null;
        let earningsChart, typesChart;

        // Tabs
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                staff = t.dataset.staff;
                document.getElementById('prompt').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                loadData();
            };
        });

        async function loadData() {
            const res = await fetch(`${API}/api/vouches/staff/${staff}`);
            const data = await res.json();
            if (!data.success) return;

            const s = data.staff;
            document.getElementById('totalEarned').textContent = `$${s.totalEarnings.toFixed(2)}`;
            document.getElementById('totalVouches').textContent = s.vouchCount;
            
            const controller = s.vouchDetails.filter(v => v.isController).length;
            const regular = s.vouchCount - controller;
            document.getElementById('controllerCount').textContent = controller;

            // Charts
            const controllerEarn = controller * 3;
            const regularEarn = s.totalEarnings - controllerEarn;

            if (earningsChart) earningsChart.destroy();
            if (typesChart) typesChart.destroy();

            const chartOpts = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { 
                        position: 'bottom',
                        labels: { color: '#a0a0a0', font: { family: 'Outfit', size: 12 }, padding: 16 }
                    }
                }
            };

            earningsChart = new Chart(document.getElementById('earningsChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Controller ($3)', 'Regular ($1)'],
                    datasets: [{
                        data: [controllerEarn || 0, regularEarn || 0],
                        backgroundColor: ['#8b5cf6', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: { ...chartOpts, cutout: '65%' }
            });

            typesChart = new Chart(document.getElementById('typesChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Controller', 'Regular'],
                    datasets: [{
                        data: [controller || 0, regular || 0],
                        backgroundColor: ['#8b5cf6', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { ...chartOpts, cutout: '65%' }
            });

            // Vouches
            const list = document.getElementById('vouchList');
            if (!s.vouchDetails.length) {
                list.innerHTML = '<div class="empty"><span>📋</span>No vouches yet. Submit your first one above!</div>';
                return;
            }

            list.innerHTML = s.vouchDetails.map(v => `
                <div class="vouch-item">
                    <div class="vouch-info">
                        <h4>${v.product}<span class="tag ${v.isController ? 'controller' : 'regular'}">${v.isController ? '$3' : '$1'}</span></h4>
                        <p>${new Date(v.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}${v.staffInvolved.length > 1 ? ` • split with ${v.staffInvolved.filter(x => x !== staff).join(', ')}` : ''}</p>
                    </div>
                    <div class="vouch-amount">+$${v.earningsPerPerson.toFixed(2)}</div>
                </div>
            `).join('');
        }

        // Upload
        const zone = document.getElementById('uploadZone');
        const input = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        zone.onclick = () => input.click();
        zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag'); };
        zone.ondragleave = () => zone.classList.remove('drag');
        zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); };
        input.onchange = e => handleFile(e.target.files[0]);

        function handleFile(f) {
            if (!f?.type.startsWith('image/')) return;
            file = f;
            const r = new FileReader();
            r.onload = e => {
                previewImg.src = e.target.result;
                zone.style.display = 'none';
                preview.classList.add('show');
                submitBtn.disabled = false;
            };
            r.readAsDataURL(f);
        }

        submitBtn.onclick = async () => {
            if (!file || !staff) return;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Analyzing...';
            status.className = 'status';

            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            try {
                const res = await fetch(`${API}/api/vouches/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staffId: staff, imageBase64: base64 })
                });
                const data = await res.json();

                if (data.success) {
                    status.textContent = `✓ ${data.message}`;
                    status.className = 'status show ok';
                    preview.classList.remove('show');
                    zone.style.display = '';
                    file = null;
                    input.value = '';
                    loadData();
                } else {
                    status.textContent = `✗ ${data.error}`;
                    status.className = 'status show err';
                }
            } catch (e) {
                status.textContent = `✗ ${e.message}`;
                status.className = 'status show err';
            }

            submitBtn.textContent = 'Analyze & Submit';
            submitBtn.disabled = true;
        };
    </script>
</body>
</html>
