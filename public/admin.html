<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SJTweaks Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface-2: #1f1f1f;
            --border: #2a2a2a;
            --text: #fafafa;
            --text-2: #a0a0a0;
            --accent: #10b981;
            --red: #f43f5e;
            --orange: #f97316;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* Login */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-overlay.hidden { display: none; }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-box p {
            color: var(--text-2);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--red);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--red);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-box button:hover { opacity: 0.9; }

        .login-err {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }

        /* App */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 44px;
            height: 44px;
            filter: brightness(1.2) hue-rotate(320deg);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        header h1 span {
            color: var(--text-2);
            font-weight: 400;
        }

        .total-box {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px 24px;
            text-align: right;
        }

        .total-box span {
            display: block;
            font-size: 0.75rem;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .total-box strong {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            color: var(--accent);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .staff-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .staff-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-color);
        }

        .staff-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .staff-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .staff-earnings {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent);
        }

        .staff-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .mini-stat {
            flex: 1;
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .mini-stat span {
            display: block;
            font-size: 0.7rem;
            color: var(--text-2);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .mini-stat strong {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Charts section */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        .chart-wrap {
            display: flex;
            justify-content: center;
        }

        .chart-wrap canvas {
            max-width: 220px !important;
            max-height: 220px !important;
        }

        /* Vouches table */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .reset-all {
            padding: 8px 16px;
            background: var(--red);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .reset-all:hover { opacity: 0.85; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
        }

        tr:hover td { background: var(--surface-2); }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .del-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-2);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .del-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 6px;
        }

        .tag.purple { background: rgba(139, 92, 246, 0.2); color: var(--purple); }
        .tag.blue { background: rgba(59, 130, 246, 0.2); color: var(--blue); }

        @media (max-width: 700px) {
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>Admin Access</h1>
            <p>Enter password to continue</p>
            <input type="password" id="pwInput" placeholder="Password" autocomplete="off">
            <button onclick="login()">Enter</button>
            <p class="login-err" id="loginErr">Invalid password</p>
        </div>
    </div>

    <div class="app">
        <header>
            <div class="header-left">
                <img src="https://i.imgur.com/MBCguvv.png" alt="" class="logo">
                <h1>Admin <span>/ payouts</span></h1>
            </div>
            <div class="total-box">
                <span>Total Owed</span>
                <strong id="totalOwed">$0.00</strong>
            </div>
        </header>

        <div class="grid" id="staffGrid"></div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">Earnings by Staff</div>
                <div class="chart-wrap"><canvas id="staffChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Product Breakdown</div>
                <div class="chart-wrap"><canvas id="productChart"></canvas></div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <div class="table-title">Recent Vouches</div>
                <button class="reset-all" onclick="resetAll()">Reset All</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Submitted By</th>
                        <th>Staff</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="vouchesBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = '';
        let pw = '';
        const COLORS = {
            sjay: '#06b6d4',
            nouzen: '#f43f5e',
            daedae: '#10b981',
            kyzo: '#8b5cf6'
        };

        document.getElementById('pwInput').onkeypress = e => { if (e.key === 'Enter') login(); };

        async function login() {
            pw = document.getElementById('pwInput').value;
            try {
                const res = await fetch(`${API}/api/vouches/admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginOverlay').classList.add('hidden');
                    render(data);
                } else {
                    document.getElementById('loginErr').style.display = 'block';
                }
            } catch {
                document.getElementById('loginErr').style.display = 'block';
            }
        }

        function render(data) {
            const total = data.staff.reduce((s, x) => s + x.totalEarnings, 0);
            document.getElementById('totalOwed').textContent = `$${total.toFixed(2)}`;

            // Staff cards
            document.getElementById('staffGrid').innerHTML = data.staff.map(s => {
                const ctrl = data.recentVouches.filter(v => v.staffInvolved.includes(s.id) && v.isController).length;
                return `
                <div class="staff-card" style="--card-color: ${COLORS[s.id]}">
                    <div class="staff-header">
                        <div class="staff-name" style="color: ${COLORS[s.id]}">${s.name}</div>
                        <div class="staff-earnings">$${s.totalEarnings.toFixed(2)}</div>
                    </div>
                    <div class="staff-stats">
                        <div class="mini-stat"><span>Vouches</span><strong>${s.vouchCount}</strong></div>
                        <div class="mini-stat"><span>Controller</span><strong style="color: var(--purple)">${ctrl}</strong></div>
                    </div>
                    <button class="reset-btn" onclick="resetStaff('${s.id}')">Reset Earnings</button>
                </div>`;
            }).join('');

            // Charts
            const staffLabels = data.staff.map(s => s.name);
            const staffData = data.staff.map(s => s.totalEarnings);
            const staffColors = data.staff.map(s => COLORS[s.id]);

            new Chart(document.getElementById('staffChart'), {
                type: 'doughnut',
                data: {
                    labels: staffLabels,
                    datasets: [{ data: staffData, backgroundColor: staffColors, borderWidth: 0 }]
                },
                options: {
                    cutout: '60%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#a0a0a0', font: { family: 'Outfit' }, padding: 12 } } }
                }
            });

            const ctrlTotal = data.recentVouches.filter(v => v.isController).length;
            const regTotal = data.recentVouches.length - ctrlTotal;

            new Chart(document.getElementById('productChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Controller ($3)', 'Regular ($1)'],
                    datasets: [{ data: [ctrlTotal, regTotal], backgroundColor: ['#8b5cf6', '#3b82f6'], borderWidth: 0 }]
                },
                options: {
                    cutout: '60%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#a0a0a0', font: { family: 'Outfit' }, padding: 12 } } }
                }
            });

            // Table
            document.getElementById('vouchesBody').innerHTML = data.recentVouches.map(v => {
                const badges = v.staffInvolved.map(s => 
                    `<span class="badge" style="background: ${COLORS[s]}20; color: ${COLORS[s]}">${s}</span>`
                ).join(' ');
                return `
                <tr>
                    <td>${new Date(v.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}</td>
                    <td><span class="badge" style="background: ${COLORS[v.submittedBy]}20; color: ${COLORS[v.submittedBy]}">${v.submittedBy}</span></td>
                    <td>${badges}</td>
                    <td>${v.product}<span class="tag ${v.isController ? 'purple' : 'blue'}">${v.isController ? '$3' : '$1'}</span></td>
                    <td style="font-family: 'JetBrains Mono', monospace; color: var(--accent)">$${v.earningsPerPerson.toFixed(2)}${v.staffInvolved.length > 1 ? ' ea' : ''}</td>
                    <td><button class="del-btn" onclick="delVouch('${v.id}')">Delete</button></td>
                </tr>`;
            }).join('');
        }

        async function resetStaff(id) {
            if (!confirm(`Reset ${id}'s earnings?`)) return;
            await fetch(`${API}/api/vouches/admin/reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw, staffId: id })
            });
            location.reload();
        }

        async function resetAll() {
            if (!confirm('Reset ALL earnings and vouches?')) return;
            await fetch(`${API}/api/vouches/admin/reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            });
            location.reload();
        }

        async function delVouch(id) {
            if (!confirm('Delete this vouch?')) return;
            await fetch(`${API}/api/vouches/admin/delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw, vouchId: id })
            });
            location.reload();
        }
    </script>
</body>
</html>
