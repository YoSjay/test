<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJTweaks Admin - Vouch Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --cyan: #00d9ff;
            --cyan-dim: #00d9ff40;
            --text: #e8e8e8;
            --text-dim: #888;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Grid background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .login-overlay.hidden { display: none; }

        .login-box {
            background: var(--bg-card);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-box h1 {
            color: var(--error);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .login-box p {
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--error);
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--error) 0%, #b91c1c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.3);
        }

        .login-error {
            color: var(--error);
            margin-top: 15px;
            display: none;
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 20px var(--error));
        }

        .logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--error);
        }

        .logo span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .total-payout {
            background: var(--bg-card);
            border: 1px solid var(--success);
            border-radius: 12px;
            padding: 15px 30px;
            text-align: right;
        }

        .total-payout span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .total-payout .amount {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            color: var(--success);
            font-weight: 700;
        }

        /* Staff cards */
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .staff-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .staff-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .staff-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--card-color);
        }

        .staff-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .staff-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--card-color);
        }

        .staff-earnings {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            color: var(--success);
            font-weight: 700;
        }

        .staff-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .staff-stat {
            flex: 1;
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .staff-stat span {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .staff-stat strong {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--error);
            border-radius: 8px;
            color: var(--error);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Recent vouches */
        .vouches-section {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
        }

        .vouches-section h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vouches-section h2::before {
            content: '';
            width: 4px;
            height: 25px;
            background: var(--error);
            border-radius: 2px;
        }

        .vouches-table {
            width: 100%;
            border-collapse: collapse;
        }

        .vouches-table th,
        .vouches-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .vouches-table th {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .vouches-table tr:hover td {
            background: var(--bg-card-hover);
        }

        .staff-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .product-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--cyan-dim);
            color: var(--cyan);
        }

        .product-tag.controller {
            background: rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }

        .delete-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--error);
            border-radius: 6px;
            color: var(--error);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: var(--error);
            color: white;
        }

        .reset-all-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--error) 0%, #b91c1c 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .reset-all-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .vouches-table { font-size: 0.85rem; }
            .vouches-table th, .vouches-table td { padding: 10px; }
            .staff-earnings { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>🔒 Admin Access</h1>
            <p>Enter admin password to continue</p>
            <input type="password" id="passwordInput" placeholder="Enter password..." autocomplete="off">
            <button onclick="attemptLogin()">Access Dashboard</button>
            <p class="login-error" id="loginError">❌ Invalid password</p>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks">
                <div>
                    <h1>ADMIN PANEL</h1>
                    <span>Vouch & Earnings Management</span>
                </div>
            </div>
            <div class="total-payout">
                <span>Total Payout Owed</span>
                <div class="amount" id="totalPayout">$0.00</div>
            </div>
        </header>

        <button class="reset-all-btn" onclick="resetAll()">⚠️ Reset All Earnings & Vouches</button>

        <div class="staff-grid" id="staffGrid">
            <!-- Staff cards will be inserted here -->
        </div>

        <section class="vouches-section">
            <h2>Recent Vouches</h2>
            <table class="vouches-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Submitted By</th>
                        <th>Staff Involved</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="vouchesBody">
                    <!-- Vouches will be inserted here -->
                </tbody>
            </table>
        </section>
    </div>

    <script>
        const API_BASE = '';
        let adminPassword = '';

        const STAFF_COLORS = {
            'sjay': '#00d9ff',
            'nouzen': '#ff6b6b',
            'daedae': '#4ecdc4',
            'kyzo': '#a855f7'
        };

        // Check for enter key on password input
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const password = document.getElementById('passwordInput').value;
            
            try {
                const res = await fetch(`${API_BASE}/api/vouches/admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    adminPassword = password;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    loadDashboard(data);
                } else {
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('passwordInput').value = '';
                }
            } catch (error) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function loadDashboard(data) {
            // Calculate total payout
            const totalPayout = data.staff.reduce((sum, s) => sum + s.totalEarnings, 0);
            document.getElementById('totalPayout').textContent = `$${totalPayout.toFixed(2)}`;

            // Render staff cards
            const staffGrid = document.getElementById('staffGrid');
            staffGrid.innerHTML = data.staff.map(staff => {
                const color = STAFF_COLORS[staff.id] || '#888';
                const controllerCount = data.recentVouches.filter(v => 
                    v.staffInvolved.includes(staff.id) && v.isController
                ).length;

                return `
                    <div class="staff-card" style="--card-color: ${color}">
                        <div class="staff-header">
                            <div class="staff-name">${staff.name}</div>
                            <div class="staff-earnings">$${staff.totalEarnings.toFixed(2)}</div>
                        </div>
                        <div class="staff-stats">
                            <div class="staff-stat">
                                <span>Total Vouches</span>
                                <strong>${staff.vouchCount}</strong>
                            </div>
                            <div class="staff-stat">
                                <span>Controller</span>
                                <strong style="color: #a855f7">${controllerCount}</strong>
                            </div>
                        </div>
                        <button class="reset-btn" onclick="resetStaff('${staff.id}')">Reset ${staff.name}'s Earnings</button>
                    </div>
                `;
            }).join('');

            // Render recent vouches
            const vouchesBody = document.getElementById('vouchesBody');
            vouchesBody.innerHTML = data.recentVouches.map(v => {
                const submitterColor = STAFF_COLORS[v.submittedBy] || '#888';
                const staffBadges = v.staffInvolved.map(s => {
                    const c = STAFF_COLORS[s] || '#888';
                    return `<span class="staff-badge" style="background: ${c}20; color: ${c}">${s}</span>`;
                }).join(' ');

                return `
                    <tr>
                        <td>${new Date(v.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</td>
                        <td><span class="staff-badge" style="background: ${submitterColor}20; color: ${submitterColor}">${v.submittedBy}</span></td>
                        <td>${staffBadges}</td>
                        <td>${v.product} <span class="product-tag ${v.isController ? 'controller' : ''}">${v.isController ? '$3' : '$1'}</span></td>
                        <td style="font-family: 'Space Mono', monospace; color: var(--success)">$${v.earningsPerPerson.toFixed(2)}${v.staffInvolved.length > 1 ? ' each' : ''}</td>
                        <td><button class="delete-btn" onclick="deleteVouch('${v.id}')">Delete</button></td>
                    </tr>
                `;
            }).join('');
        }

        async function resetStaff(staffId) {
            if (!confirm(`Are you sure you want to reset ${staffId}'s earnings and vouches?`)) return;

            try {
                const res = await fetch(`${API_BASE}/api/vouches/admin/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPassword, staffId })
                });

                if ((await res.json()).success) {
                    location.reload();
                }
            } catch (error) {
                alert('Error resetting staff');
            }
        }

        async function resetAll() {
            if (!confirm('⚠️ This will delete ALL vouches and reset ALL earnings. Are you sure?')) return;
            if (!confirm('This action cannot be undone. Type CONFIRM to proceed.')) return;

            try {
                const res = await fetch(`${API_BASE}/api/vouches/admin/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPassword })
                });

                if ((await res.json()).success) {
                    location.reload();
                }
            } catch (error) {
                alert('Error resetting all');
            }
        }

        async function deleteVouch(vouchId) {
            if (!confirm('Delete this vouch?')) return;

            try {
                const res = await fetch(`${API_BASE}/api/vouches/admin/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPassword, vouchId })
                });

                if ((await res.json()).success) {
                    location.reload();
                }
            } catch (error) {
                alert('Error deleting vouch');
            }
        }
    </script>
</body>
</html>
